<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>객실 예약상태 관리 | 팜투어 남원누비고</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#FBF7EF;--paper:#fff;--ink:#3A2E22;--soft:#6C5D4B;--brown:#8A5A33;--brown-d:#5C3D1F;
--sand:#F4EADA;--line:#E8DCC8;--green:#1B7A3D;--green-bg:#E4F7EB;--red:#C4472F;--red-bg:#FBEEEA;--naver:#03C75A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;word-break:keep-all;padding-bottom:60px}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
header{background:linear-gradient(160deg,#5C3D1F,#8A5A33);color:#fff;padding:26px 0 22px;margin-bottom:18px}
header .wrap{display:flex;align-items:center;gap:12px}
header img{height:44px;filter:drop-shadow(0 0 5px rgba(255,255,255,.8))}
header h1{font-family:'Jua',sans-serif;font-size:21px;font-weight:400}
header p{font-size:12.5px;opacity:.85}
.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 4px 16px rgba(90,62,31,.08)}
.lodge-head{display:flex;align-items:baseline;gap:8px;margin:6px 2px 10px}
.lodge-head h2{font-family:'Jua',sans-serif;font-size:17px;color:var(--brown-d)}
.lodge-head span{font-size:12px;color:var(--soft)}
.room{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 4px;border-bottom:1px dashed var(--line)}
.room:last-child{border-bottom:none}
.room .nm{font-weight:900;font-size:15.5px}
.room .st{font-size:12px;font-weight:700;border-radius:6px;padding:2px 9px;margin-left:8px}
.room .st.on{color:var(--green);background:var(--green-bg)}
.room .st.off{color:var(--red);background:var(--red-bg)}
/* 토글 스위치 */
.tgl{position:relative;width:74px;height:34px;flex:0 0 auto;cursor:pointer}
.tgl input{opacity:0;width:0;height:0}
.tgl .tr{position:absolute;inset:0;background:var(--naver);border-radius:999px;transition:.25s}
.tgl .tr::after{content:"";position:absolute;top:4px;left:4px;width:26px;height:26px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.tgl input:checked + .tr{background:#B9AE9D}
.tgl input:checked + .tr::after{left:44px}
.tgl input:disabled + .tr{opacity:.45}
.hintrow{font-size:11.5px;color:var(--soft);text-align:right;margin:-6px 2px 8px}
.bar{display:flex;gap:8px;margin-bottom:14px}
.btn{flex:1;border:none;border-radius:12px;padding:12px;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer;transition:.15s}
.btn.re{background:var(--brown);color:#fff}
.btn.re:hover{background:var(--brown-d)}
.btn.lk{background:var(--sand);color:var(--brown-d);text-decoration:none;text-align:center;font-size:14px;display:flex;align-items:center;justify-content:center}
.msg{border-radius:12px;padding:12px 15px;font-size:13.5px;margin-bottom:14px;display:none}
.msg.ok{display:block;background:var(--green-bg);color:var(--green)}
.msg.err{display:block;background:var(--red-bg);color:var(--red)}
.setup h3{font-family:'Jua',sans-serif;font-size:15px;color:var(--brown-d);margin-bottom:8px}
.setup p{font-size:12.5px;color:var(--soft);margin-bottom:10px}
.setup input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:13px;margin-bottom:8px;font-family:inherit}
.setup .save{width:100%;background:var(--naver);color:#fff}
.foot{font-size:11.5px;color:var(--soft);text-align:center;margin-top:18px}
.stamp{font-size:12px;color:var(--soft);text-align:center;margin-bottom:12px}
.badge-off{display:inline-block;font-size:11px;background:var(--red-bg);color:var(--red);border-radius:5px;padding:1px 7px;font-weight:900}
</style>
</head>
<body>

<header>
  <div class="wrap">
    <img src="images/logo_nubigo.png" alt="남원누비GO">
    <div>
      <h1>객실 예약상태 관리</h1>
      <p>도그하우스 만들기 1박2일 · 토글로 판매상태를 변경하세요</p>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="msg" id="msg"></div>
  <p class="stamp" id="stamp">상태를 불러오는 중…</p>

  <div class="bar">
    <button class="btn re" onclick="loadStatus()">🔄 새로고침</button>
    <a class="btn lk" href="https://docs.google.com/spreadsheets/d/1NJdmg1Ce1CHmpH9JxG6VRBR3kqBOW0NR4UZ-NEAyFZE/edit" target="_blank" rel="noopener">📊 시트 열기</a>
    <a class="btn lk" href="./" target="_blank" rel="noopener">🐾 상세페이지</a>
  </div>

  <div id="rooms"></div>

  <div class="card setup" id="setup">
    <h3>⚙ 연결 설정</h3>
    <p>예약상태API(앱스크립트)의 웹 앱 URL(…/exec)과 관리키를 입력하세요. 이 브라우저에만 저장됩니다.</p>
    <input id="apiUrl" type="url" placeholder="https://script.google.com/macros/s/…/exec">
    <input id="apiKey" type="password" placeholder="관리키">
    <button class="btn save" onclick="saveConfig()">저장하고 연결</button>
  </div>

  <p class="foot">시트 값을 직접 고쳐도 되고, 이 페이지 토글을 써도 됩니다 — 결과는 같은 시트에 저장됩니다.<br>상세페이지에는 변경 후 최대 5분 내 반영됩니다.</p>
</div>

<script>
/* 객실 정의 (숙소별) — 상세페이지·시트와 방이름이 정확히 일치해야 합니다 */
const LODGES = [
  { name:'지리산 순이네흙집 민박', sub:'황토 흙집 · 4팀', rooms:['머슴달래','도토라지','박졸갈래','콩덕벅지'] },
  { name:'지리산 별헤는밤 펜션',   sub:'원목 펜션 · 4팀', rooms:['오로라','별 하나','별 둘','별 셋'] }
];
/* 읽기 전용 폴백: 시트 CSV 게시 링크 (API 미설정 시 조회만 가능) */
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaYgi67Yda53ZiVJfSz8tUbGDBwzAHRo5UZV9mJTE_Hb5sZa6lxUcU4X50DATO596ppkwAEhSIhmRW/pub?output=csv';

const $ = id => document.getElementById(id);
const conf = {
  get url(){ return localStorage.getItem('nubigo_api_url') || ''; },
  get key(){ return localStorage.getItem('nubigo_api_key') || ''; }
};

function showMsg(text, ok){
  const m = $('msg');
  m.textContent = text;
  m.className = 'msg ' + (ok ? 'ok' : 'err');
  clearTimeout(m._t);
  m._t = setTimeout(() => { m.className = 'msg'; }, 4000);
}

function render(states){
  // states: { 방이름: true(판매완료) | false(판매중) }
  const writable = !!conf.url;
  $('rooms').innerHTML = LODGES.map(l => `
    <div class="card">
      <div class="lodge-head"><h2>${l.name}</h2><span>${l.sub}</span></div>
      ${writable ? '' : '<p class="hintrow">조회 전용 <span class="badge-off">API 미연결</span> — 아래 연결 설정을 완료하면 토글로 변경할 수 있어요</p>'}
      ${l.rooms.map(r => {
        const sold = !!states[r];
        return `
        <div class="room">
          <div><span class="nm">${r}</span><span class="st ${sold?'off':'on'}">${sold?'판매완료':'예약 가능'}</span></div>
          <label class="tgl" title="${sold?'판매중으로 되돌리기':'판매완료로 변경'}">
            <input type="checkbox" ${sold?'checked':''} ${writable?'':'disabled'} onchange="toggleRoom('${r.replace(/'/g,"\\'")}', this)">
            <span class="tr"></span>
          </label>
        </div>`;
      }).join('')}
    </div>`).join('');
}

async function loadStatus(){
  $('stamp').textContent = '상태를 불러오는 중…';
  const states = {};
  LODGES.forEach(l => l.rooms.forEach(r => states[r] = false));
  try{
    let txt;
    if(conf.url){
      txt = await (await fetch(conf.url + '?t=' + Date.now())).text();
    }else{
      txt = await (await fetch(CSV_URL + '&t=' + Date.now())).text();
    }
    txt = txt.trim();
    if(txt.startsWith('{')){
      const data = JSON.parse(txt);
      (data.rooms || []).forEach(it => { if(it.room in states) states[it.room] = /판매완료/.test(it.status); });
      $('stamp').textContent = '✅ 실시간 조회 (앱스크립트 API) · ' + new Date().toLocaleTimeString('ko-KR');
    }else{
      const names = Object.keys(states);
      txt.split(/\r?\n/).forEach(line => {
        const cols = line.split(',').map(s => s.replace(/^"|"$/g,'').trim());
        const nm = names.find(n => cols.includes(n));
        if(nm) states[nm] = cols.some(c => /판매완료/.test(c));
      });
      $('stamp').textContent = '📄 시트 게시본 조회 (최대 5분 지연) · ' + new Date().toLocaleTimeString('ko-KR');
    }
  }catch(e){
    $('stamp').textContent = '⚠ 상태를 불러오지 못했습니다 — 네트워크 또는 설정을 확인하세요';
  }
  render(states);
}

async function toggleRoom(room, el){
  const sold = el.checked;               // checked = 판매완료
  el.disabled = true;
  try{
    const url = conf.url + '?room=' + encodeURIComponent(room)
              + '&status=' + encodeURIComponent(sold ? '판매완료' : '판매중')
              + '&key=' + encodeURIComponent(conf.key);
    const data = JSON.parse(await (await fetch(url)).text());
    if(data.ok){
      showMsg(`「${room}」 → ${data.status} 저장 완료`, true);
    }else{
      el.checked = !sold;
      showMsg('저장 실패: ' + (data.error || '알 수 없는 오류'), false);
    }
  }catch(e){
    el.checked = !sold;
    showMsg('저장 실패: API에 연결할 수 없습니다', false);
  }
  el.disabled = false;
  loadStatus();
}

function saveConfig(){
  const u = $('apiUrl').value.trim(), k = $('apiKey').value.trim();
  if(!u || !/\/exec\b/.test(u)){ showMsg('올바른 웹 앱 URL(…/exec)을 입력하세요', false); return; }
  if(!k){ showMsg('관리키를 입력하세요', false); return; }
  localStorage.setItem('nubigo_api_url', u);
  localStorage.setItem('nubigo_api_key', k);
  showMsg('연결 설정이 저장되었습니다', true);
  initSetup();
  loadStatus();
}

function initSetup(){
  if(conf.url){
    $('apiUrl').value = conf.url;
    $('apiKey').value = conf.key;
    $('setup').querySelector('h3').textContent = '⚙ 연결 설정 (연결됨)';
  }
}
initSetup();
loadStatus();
</script>
</body>
</html>
