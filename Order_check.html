<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>객실 예약상태 관리 | 팜투어 남원누비고</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#FBF7EF;--paper:#fff;--ink:#3A2E22;--soft:#6C5D4B;--brown:#8A5A33;--brown-d:#5C3D1F;
--sand:#F4EADA;--line:#E8DCC8;--green:#1B7A3D;--green-bg:#E4F7EB;--red:#C4472F;--red-bg:#FBEEEA;--naver:#03C75A}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);line-height:1.6;word-break:keep-all;padding-bottom:60px}
.wrap{max-width:560px;margin:0 auto;padding:0 16px}
header{background:linear-gradient(160deg,#5C3D1F,#8A5A33);color:#fff;padding:26px 0 22px;margin-bottom:18px}
header .wrap{display:flex;align-items:center;gap:12px}
header img{height:44px;filter:drop-shadow(0 0 5px rgba(255,255,255,.8))}
header h1{font-family:'Jua',sans-serif;font-size:21px;font-weight:400}
header p{font-size:12.5px;opacity:.85}
.card{background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:18px;margin-bottom:14px;box-shadow:0 4px 16px rgba(90,62,31,.08)}
.lodge-head{display:flex;align-items:baseline;gap:8px;margin:6px 2px 10px}
.lodge-head h2{font-family:'Jua',sans-serif;font-size:17px;color:var(--brown-d)}
.lodge-head span{font-size:12px;color:var(--soft)}
.room{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 4px;border-bottom:1px dashed var(--line)}
.room:last-child{border-bottom:none}
.room .nm{font-weight:900;font-size:15.5px}
.room .st{font-size:12px;font-weight:700;border-radius:6px;padding:2px 9px;margin-left:8px}
.room .st.on{color:var(--green);background:var(--green-bg)}
.room .st.off{color:var(--red);background:var(--red-bg)}
/* 토글 스위치 */
.tgl{position:relative;width:74px;height:34px;flex:0 0 auto;cursor:pointer}
.tgl input{opacity:0;width:0;height:0}
.tgl .tr{position:absolute;inset:0;background:var(--naver);border-radius:999px;transition:.25s}
.tgl .tr::after{content:"";position:absolute;top:4px;left:4px;width:26px;height:26px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 2px 6px rgba(0,0,0,.25)}
.tgl input:checked + .tr{background:#B9AE9D}
.tgl input:checked + .tr::after{left:44px}
.tgl input:disabled + .tr{opacity:.45}
.hintrow{font-size:11.5px;color:var(--soft);text-align:right;margin:-6px 2px 8px}
.bar{display:flex;gap:8px;margin-bottom:14px}
.btn{flex:1;border:none;border-radius:12px;padding:12px;font-family:'Jua',sans-serif;font-size:15px;cursor:pointer;transition:.15s}
.btn.re{background:var(--brown);color:#fff}
.btn.re:hover{background:var(--brown-d)}
.btn.lk{background:var(--sand);color:var(--brown-d);text-decoration:none;text-align:center;font-size:14px;display:flex;align-items:center;justify-content:center}
.msg{border-radius:12px;padding:12px 15px;font-size:13.5px;margin-bottom:14px;display:none}
.msg.ok{display:block;background:var(--green-bg);color:var(--green)}
.msg.err{display:block;background:var(--red-bg);color:var(--red)}
.setup h3{font-family:'Jua',sans-serif;font-size:15px;color:var(--brown-d);margin-bottom:8px}
.setup p{font-size:12.5px;color:var(--soft);margin-bottom:10px}
.setup input{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:13px;margin-bottom:8px;font-family:inherit}
.setup .save{width:100%;background:var(--naver);color:#fff}
.foot{font-size:11.5px;color:var(--soft);text-align:center;margin-top:18px}
.stamp{font-size:12px;color:var(--soft);text-align:center;margin-bottom:12px}
.badge-off{display:inline-block;font-size:11px;background:var(--red-bg);color:var(--red);border-radius:5px;padding:1px 7px;font-weight:900}
/* ── 비밀번호 잠금 화면 ── */
.lock{position:fixed;inset:0;background:linear-gradient(160deg,#5C3D1F,#8A5A33 70%,#A5713F);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px}
.lock-box{background:#fff;border-radius:20px;padding:34px 28px;max-width:360px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
.lock-box img{height:52px;margin:0 auto 14px;display:block}
.lock-box h2{font-family:'Jua',sans-serif;font-size:20px;color:var(--brown-d);margin-bottom:6px}
.lock-box p{font-size:13px;color:var(--soft);margin-bottom:18px}
.lock-box input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:13px 14px;font-size:16px;text-align:center;letter-spacing:.2em;margin-bottom:10px;font-family:inherit}
.lock-box input:focus{outline:none;border-color:var(--brown)}
.lock-box .btn{width:100%}
.lock-err{display:none;background:var(--red-bg);color:var(--red);border-radius:10px;padding:10px 12px;font-size:13px;font-weight:700;margin-bottom:10px}
.role-bar{display:flex;align-items:center;justify-content:space-between;background:var(--sand);border:1px solid var(--line);border-radius:12px;padding:9px 14px;font-size:12.5px;color:var(--brown-d);font-weight:700;margin-bottom:14px}
/* ── 추천인 코드 관리자 화면 (통합 관리자 전용) ── */
.ref-admin h2{font-family:'Jua',sans-serif;font-size:17px;color:var(--brown-d);margin-bottom:2px}
.ref-admin .sub{font-size:12px;color:var(--soft);margin-bottom:12px}
.ref-summary{display:flex;gap:8px;margin-bottom:12px}
.ref-summary .box{flex:1;background:var(--sand);border-radius:10px;padding:10px 6px;text-align:center}
.ref-summary .box b{display:block;font-family:'Jua',sans-serif;font-size:18px;color:var(--brown-d)}
.ref-summary .box span{font-size:11px;color:var(--soft)}
.ref-table{width:100%;border-collapse:collapse;font-size:12.5px}
.ref-table th{background:var(--sand);color:var(--brown-d);font-size:11.5px;padding:7px 5px;text-align:center;border-bottom:1px solid var(--line)}
.ref-table td{padding:8px 5px;text-align:center;border-bottom:1px dashed var(--line)}
.ref-table td.nm{text-align:left;font-weight:700}
.ref-table tr.top td{background:var(--green-bg)}
.ref-empty{font-size:12.5px;color:var(--soft);text-align:center;padding:16px 0}
.ref-warn{font-size:11.5px;color:var(--red);background:var(--red-bg);border-radius:8px;padding:8px 10px;margin-top:10px}
.role-bar button{border:none;background:none;color:var(--red);font-weight:900;font-size:12px;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- ═══ 비밀번호 잠금 화면 ═══ -->
<div class="lock" id="lock">
  <div class="lock-box">
    <img src="images/logo_nubigo.png" alt="남원누비GO">
    <h2>관리자 확인</h2>
    <p>객실 예약상태 관리 페이지입니다.<br>발급받은 비밀번호를 입력하세요.</p>
    <div class="lock-err" id="lockErr"></div>
    <input type="password" id="lockPw" placeholder="비밀번호" autocomplete="off" onkeydown="if(event.key==='Enter')checkPw()">
    <button class="btn re" onclick="checkPw()">확인</button>
  </div>
</div>

<header>
  <div class="wrap">
    <img src="images/logo_nubigo.png" alt="남원누비GO">
    <div>
      <h1>객실 예약상태 관리</h1>
      <p>도그하우스 만들기 1박2일 · 토글로 판매상태를 변경하세요</p>
    </div>
  </div>
</header>

<div class="wrap">

  <div class="role-bar" id="roleBar" style="display:none"><span id="roleName"></span><button onclick="logout()">로그아웃</button></div>
  <div class="msg" id="msg"></div>
  <p class="stamp" id="stamp">상태를 불러오는 중…</p>

  <div class="bar">
    <button class="btn re" onclick="loadStatus()">🔄 새로고침</button>
    <a class="btn lk" href="https://docs.google.com/spreadsheets/d/1NJdmg1Ce1CHmpH9JxG6VRBR3kqBOW0NR4UZ-NEAyFZE/edit" target="_blank" rel="noopener">📊 시트 열기</a>
    <a class="btn lk" href="./" target="_blank" rel="noopener">🐾 상세페이지</a>
  </div>

  <div id="rooms"></div>

  <!-- ═══ 추천인 코드 관리자 화면 (통합 관리자 전용, 다른 관리자에게는 표시되지 않음) ═══ -->
  <div class="card ref-admin" id="refAdminCard" style="display:none">
    <h2>🎁 추천인 코드 현황</h2>
    <p class="sub">추천 링크 접속수 · 예약 확정 건수 · 지급할 편의점 상품권 금액</p>
    <div class="bar">
      <button class="btn re" onclick="loadReferralList()">🔄 새로고침</button>
      <a class="btn lk" href="https://docs.google.com/spreadsheets/d/1NJdmg1Ce1CHmpH9JxG6VRBR3kqBOW0NR4UZ-NEAyFZE/edit" target="_blank" rel="noopener">📊 추천인코드 시트</a>
    </div>
    <div class="ref-summary" id="refSummary" style="display:none">
      <div class="box"><b id="refSumClicks">0</b><span>총 접속수</span></div>
      <div class="box"><b id="refSumConfirmed">0</b><span>확정 건수</span></div>
      <div class="box"><b id="refSumPayout">0</b><span>지급 예정(원)</span></div>
    </div>
    <div id="refListWrap"><p class="ref-empty">불러오는 중…</p></div>
  </div>

  <p class="foot">시트 값을 직접 고쳐도 되고, 이 페이지 토글을 써도 됩니다 — 결과는 같은 시트에 저장됩니다.<br>로그인하면 예약상태API에 자동으로 연결됩니다.</p>
</div>

<script>
/* 객실 정의 (숙소별) — 상세페이지·시트와 방이름이 정확히 일치해야 합니다 */
const LODGES = [
  { name:'지리산 순이네흙집 민박', sub:'황토 흙집 · 4팀', rooms:['머슴달래','도토라지','박졸갈래','콩덕벅지'] },
  { name:'지리산 별헤는밤 펜션',   sub:'원목 펜션 · 4팀', rooms:['오로라','별 넷','별 여섯','별 일곱'] }
];
/* 읽기 전용 폴백: 시트 CSV 게시 링크 (API 미설정 시 조회만 가능) */
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTaYgi67Yda53ZiVJfSz8tUbGDBwzAHRo5UZV9mJTE_Hb5sZa6lxUcU4X50DATO596ppkwAEhSIhmRW/pub?output=csv';

const $ = id => document.getElementById(id);

/* ═══ API 연결 (자동) ═══
 * 로그인에 성공하면 아래 웹 앱 URL로 자동 연결됩니다.
 * 관리키는 소스에 노출되지 않도록 각 비밀번호로 암호화(AES-GCM)해 두었고,
 * 올바른 비밀번호로 로그인할 때만 복호화되어 사용됩니다. */
const API_URL = 'https://script.google.com/macros/s/AKfycbwIxDVMif4-0Ml9I0NCTtXIC6IKVbojtr0ZS_uKEzW8evvVs0AqYKKNve8BeZIdSEzv/exec';
const conf = {
  get url(){ return API_URL; },
  get key(){ return sessionStorage.getItem('nubigo_admin_key') || ''; }
};

/* ═══ 접근 비밀번호 (SHA-256 해시로만 저장) ═══
 * 별헤는밤 전용 / 순이네흙집 전용 / 통합 관리자 3종
 * encKey = 해당 비밀번호로 암호화된 관리키 */
const AUTH_ROLES = {
  '0992c291bc06df951a966bfc9a37cfb711e525f873874e4d946dffed1b34f6de': { name:'별헤는밤 펜션 관리자',  lodges:['지리산 별헤는밤 펜션'], encKey:'RB9N2vCfOF0navrHxyj+QGoEbxpfZEj11c7bH7iaSw4sUHkVoU8=' },
  '4bfd76c762250b2dc3a0d4fff2bdead6d935e87e7c0211994150c35a09724e67': { name:'순이네흙집 관리자',     lodges:['지리산 순이네흙집 민박'], encKey:'GAO75l8Wucztx1hjmdadrWgx/JWRKGm8OyboChC0l0P122ysOJs=' },
  '96d84865dfa9b2778d20b612c4123ecfed0aa0193b50ab4dff0122641b02aafd': { name:'통합 관리자 (남원누비고)', lodges:['지리산 순이네흙집 민박','지리산 별헤는밤 펜션'], encKey:'b3VQXQ32diXepSMxyvr2cFU5gPVSkXnsmrnj/qDCNcr3SrQwDqE=', refAdmin:true }
};
let ROLE = null;

async function sha256bytes(t){
  return new Uint8Array(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(t)));
}
const toHex = u8 => [...u8].map(x => x.toString(16).padStart(2,'0')).join('');

async function decryptAdminKey(pw, encKeyB64){
  const raw = Uint8Array.from(atob(encKeyB64), c => c.charCodeAt(0));
  const iv = raw.slice(0,12), ct = raw.slice(12);
  const aesKey = await crypto.subtle.importKey('raw', await sha256bytes(pw), 'AES-GCM', false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv}, aesKey, ct);
  return new TextDecoder().decode(pt);
}

async function checkPw(){
  const pw = $('lockPw').value.trim();
  if(!pw) return;
  let h = '';
  try{ h = toHex(await sha256bytes(pw)); }catch(e){}
  const role = AUTH_ROLES[h];
  if(role){
    try{
      const adminKey = await decryptAdminKey(pw, role.encKey);
      sessionStorage.setItem('nubigo_admin_key', adminKey);
    }catch(e){/* 복호화 실패 시 조회 전용으로 동작 */}
    sessionStorage.setItem('nubigo_role_hash', h);
    enter(role);
  }else{
    const er = $('lockErr');
    er.style.display = 'block';
    er.textContent = '❌ 비밀번호가 올바르지 않습니다. 상세페이지로 이동합니다…';
    $('lockPw').value = '';
    setTimeout(() => location.href = './', 1800);
  }
}
function enter(role){
  ROLE = role;
  $('lock').style.display = 'none';
  $('roleBar').style.display = 'flex';
  $('roleName').textContent = '🔑 ' + role.name;
  if(role.refAdmin){
    $('refAdminCard').style.display = 'block';
    loadReferralList();
  }
  loadStatus();
}
function logout(){
  sessionStorage.removeItem('nubigo_role_hash');
  sessionStorage.removeItem('nubigo_admin_key');
  location.reload();
}
const canEdit = lodgeName => !!conf.url && !!ROLE && ROLE.lodges.includes(lodgeName);

function showMsg(text, ok){
  const m = $('msg');
  m.textContent = text;
  m.className = 'msg ' + (ok ? 'ok' : 'err');
  clearTimeout(m._t);
  m._t = setTimeout(() => { m.className = 'msg'; }, 4000);
}

function render(states){
  // states: { 방이름: true(판매완료) | false(판매중) }
  $('rooms').innerHTML = LODGES.map(l => {
    const editable = canEdit(l.name);
    let hint = '';
    if(!conf.url) hint = '<p class="hintrow">조회 전용 <span class="badge-off">API 미연결</span> — 아래 연결 설정을 완료하면 토글로 변경할 수 있어요</p>';
    else if(!editable) hint = '<p class="hintrow"><span class="badge-off">권한 없음</span> 이 숙소는 조회만 가능합니다</p>';
    return `
    <div class="card">
      <div class="lodge-head"><h2>${l.name}</h2><span>${l.sub}</span></div>
      ${hint}
      ${l.rooms.map(r => {
        const sold = !!states[r];
        return `
        <div class="room">
          <div><span class="nm">${r}</span><span class="st ${sold?'off':'on'}">${sold?'판매완료':'예약 가능'}</span></div>
          <label class="tgl" title="${sold?'판매중으로 되돌리기':'판매완료로 변경'}">
            <input type="checkbox" ${sold?'checked':''} ${editable?'':'disabled'} onchange="toggleRoom('${r.replace(/'/g,"\\'")}', this)">
            <span class="tr"></span>
          </label>
        </div>`;
      }).join('')}
    </div>`;
  }).join('');
}

async function loadStatus(){
  $('stamp').textContent = '상태를 불러오는 중…';
  const states = {};
  LODGES.forEach(l => l.rooms.forEach(r => states[r] = false));
  try{
    // 1차: 앱스크립트 API (실시간)
    const txt = (await (await fetch(conf.url + '?t=' + Date.now())).text()).trim();
    const data = JSON.parse(txt);
    (data.rooms || []).forEach(it => { if(it.room in states) states[it.room] = /판매완료/.test(it.status); });
    $('stamp').textContent = '✅ 실시간 조회 (앱스크립트 API) · ' + new Date().toLocaleTimeString('ko-KR');
  }catch(e){
    // 2차: 시트 CSV 게시본 (최대 5분 지연)
    try{
      const txt = (await (await fetch(CSV_URL + '&t=' + Date.now())).text()).trim();
      const names = Object.keys(states);
      txt.split(/\r?\n/).forEach(line => {
        const cols = line.split(',').map(s => s.replace(/^"|"$/g,'').trim());
        const nm = names.find(n => cols.includes(n));
        if(nm) states[nm] = cols.some(c => /판매완료/.test(c));
      });
      $('stamp').textContent = '📄 시트 게시본 조회 (최대 5분 지연) · ' + new Date().toLocaleTimeString('ko-KR');
    }catch(e2){
      $('stamp').textContent = '⚠ 상태를 불러오지 못했습니다 — 네트워크를 확인하세요';
    }
  }
  render(states);
}

async function loadReferralList(){
  if(!ROLE || !ROLE.refAdmin) return;
  const wrap = $('refListWrap');
  wrap.innerHTML = '<p class="ref-empty">불러오는 중…</p>';
  if(!conf.url || !conf.key){
    wrap.innerHTML = '<p class="ref-empty">API 연결 또는 관리키가 필요합니다.</p>';
    return;
  }
  try{
    const url = conf.url + '?action=refList&key=' + encodeURIComponent(conf.key) + '&t=' + Date.now();
    const data = JSON.parse(await (await fetch(url)).text());
    if(!data.ok){
      wrap.innerHTML = '<p class="ref-empty">불러오기 실패: ' + (data.error || '알 수 없는 오류') + '</p>';
      return;
    }
    $('refSummary').style.display = 'flex';
    $('refSumClicks').textContent = data.totalClicks || 0;
    $('refSumConfirmed').textContent = data.totalConfirmed || 0;
    $('refSumPayout').textContent = (data.totalPayout || 0).toLocaleString();

    if(!data.list || !data.list.length){
      wrap.innerHTML = '<p class="ref-empty">아직 발급된 추천인 코드가 없습니다.</p>';
      return;
    }
    const rows = data.list.map(x => `
      <tr class="${x.confirmed > 0 ? 'top' : ''}">
        <td class="nm">${x.name || ''}</td>
        <td>${x.code}</td>
        <td>${x.phoneMasked || ''}</td>
        <td>${x.clicks}</td>
        <td>${x.confirmed}</td>
        <td>${x.payout.toLocaleString()}</td>
      </tr>`).join('');
    let html = `<div style="overflow-x:auto"><table class="ref-table">
      <thead><tr><th>추천인</th><th>코드</th><th>전화</th><th>접속수</th><th>확정</th><th>지급액(원)</th></tr></thead>
      <tbody>${rows}</tbody></table></div>`;
    if(data.unmatched){
      html += `<p class="ref-warn">⚠ 참가신청서에서 "확정"으로 표시됐지만 등록된 추천인 코드와 일치하지 않는 건이 ${data.unmatched}건 있어요 — 오탈자 등을 확인해 주세요.</p>`;
    }
    wrap.innerHTML = html;
  }catch(e){
    wrap.innerHTML = '<p class="ref-empty">불러오기 실패: API에 연결할 수 없습니다.</p>';
  }
}

async function toggleRoom(room, el){
  const lodge = LODGES.find(l => l.rooms.includes(room));
  if(!lodge || !canEdit(lodge.name)){
    el.checked = !el.checked;
    showMsg('이 숙소를 변경할 권한이 없습니다', false);
    return;
  }
  const sold = el.checked;               // checked = 판매완료
  el.disabled = true;
  try{
    const url = conf.url + '?room=' + encodeURIComponent(room)
              + '&status=' + encodeURIComponent(sold ? '판매완료' : '판매중')
              + '&key=' + encodeURIComponent(conf.key);
    const data = JSON.parse(await (await fetch(url)).text());
    if(data.ok){
      showMsg(`「${room}」 → ${data.status} 저장 완료`, true);
    }else{
      el.checked = !sold;
      showMsg('저장 실패: ' + (data.error || '알 수 없는 오류'), false);
    }
  }catch(e){
    el.checked = !sold;
    showMsg('저장 실패: API에 연결할 수 없습니다', false);
  }
  el.disabled = false;
  loadStatus();
}

// 세션에 유효한 로그인 기록이 있으면 잠금 해제, 없으면 비밀번호 입력 대기
(function(){
  const h = sessionStorage.getItem('nubigo_role_hash');
  if(h && AUTH_ROLES[h]){ enter(AUTH_ROLES[h]); }
  else { $('lockPw').focus(); }
})();
